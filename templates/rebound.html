<!DOCTYPE html>
<html>
<head>
  <title>低位反弹信号</title>
</head>
<body style="background:#0b1220; color:white; font-family:sans-serif">

<h2>🔥 低位反弹信号 Top 3</h2>

{% if picks %}
{% for p in picks %}

<div style="
background:#11284d;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(255,255,255,0.08);
">

<h2>{{ p.ticker }}</h2>
<div>💰 现价: {{ p.price }}</div>
<br>
<div>🟢 买入区:</div>
<div>{{ p.buy_low }} - {{ p.buy_high }}</div>
<br>
<div>🔴 止损:</div>
<div>{{ p.stop }}</div>
<br>
<div>🎯 目标区:</div>
<div>{{ p.target1 }} - {{ p.target2 }}</div>
<br>
<div>⚖️ 风险: {{ p.risk_pct }}%</div>
<div>{{ p.rr_grade }} 盈亏比: {{ p.rr }}</div>

</div>
{% endfor %}

{% else %}

<p>暂无符合条件</p>

{% endif %}

<br>
<a href="/"><button>⬅ 返回</button></a>

</body>
</html>
