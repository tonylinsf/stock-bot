<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>SmartAI Pro 登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    :root{--bg:#07101f;--panel:#0d1728;--line:#24334b;--text:#eef4ff;--muted:#91a2bb;--blue:#4d8dff;--red:#ff747b}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at top,#183055 0,#07101f 48%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    .login-card{width:min(100%,420px);background:linear-gradient(145deg,rgba(17,31,52,.99),rgba(10,20,36,.99));border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 24px 60px rgba(0,0,0,.38)}
    .logo{font-size:30px;font-weight:950;margin:0}.sub{color:var(--muted);margin:7px 0 26px}
    label{display:block;font-size:13px;font-weight:800;color:#a9c4ed;margin:14px 0 7px}
    input{width:100%;background:#050b17;color:white;border:1px solid #344763;border-radius:13px;padding:14px;font-size:16px;outline:none}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,141,255,.14)}
    button{width:100%;margin-top:20px;border:0;border-radius:13px;background:linear-gradient(135deg,#2d6be8,#367ff7);color:white;font-weight:900;padding:14px;font-size:16px;cursor:pointer}
    .error{margin-top:16px;padding:11px 12px;border-radius:11px;background:rgba(255,116,123,.1);border:1px solid rgba(255,116,123,.35);color:#ffc4c8}
    .note{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}
  </style>
</head>
<body>
  <main class="login-card">
    <h1 class="logo">SmartAI Pro</h1>
    <div class="sub">登录后才能使用股票分析功能</div>
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next or '' }}">
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" autocapitalize="none" required autofocus>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">登录</button>
    </form>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="note">仅限授权用户使用</div>
  </main>
</body>
</html>
